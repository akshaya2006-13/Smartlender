{% extends "base.html" %}

{% block content %}
<section class="py-5 text-center text-color my-auto">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 animated-fade">
                
                <!-- Large icon -->
                <div class="fs-1 text-danger mb-4" style="font-size: 6rem !important;">
                    <i class="fa-solid fa-face-frown-open"></i>
                </div>
                
                <h1 class="fw-bold mb-2 text-danger">404 - File Not Found</h1>
                <h4 class="fw-bold text-color mb-3">Resource Location Invalid</h4>
                <p class="text-muted mb-5">The URL or page endpoint you requested does not exist or has been relocated by system admin configurations.</p>
                
                <div class="d-flex justify-content-center gap-3">
                    <a href="{{ url_for('home') }}" class="btn btn-primary-custom px-4 py-2"><i class="fas fa-home me-2"></i>Return Home</a>
                    <a href="{{ url_for('predict') }}" class="btn btn-secondary-custom rounded-pill px-4"><i class="fas fa-search me-2"></i>New Assessment</a>
                </div>
                
            </div>
        </div>
    </div>
</section>
{% endblock %}
